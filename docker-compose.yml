services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aiwallet
      POSTGRES_PASSWORD: aiwallet_dev
      POSTGRES_DB: aiwallet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
